<!DOCTYPE html>
<html lang="fr" style="background:#000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL ASSIMA EGYPT</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; color: #D32F2F; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('assets/images/arriere_plan.jpg') center/cover no-repeat fixed;
        }
        
        #login-screen { 
            position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/images/arriere_plan.jpg') center/cover no-repeat;
        }
        .login-box { text-align: center; width: 90%; max-width: 400px; padding: 2rem; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 30px; border: 1px solid rgba(211,47,47,0.3); }
        .logo { width: 150px; margin-bottom: 1.5rem; filter: drop-shadow(0 0 15px rgba(211,47,47,0.4)); }
        
        input, select { 
            width: 100%; padding: 1.2rem; font-size: 1.5rem; text-align: center; 
            background: #000; border: 2px solid #333; color: #fff; border-radius: 15px;
            margin-bottom: 1.2rem; outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: #D32F2F; box-shadow: 0 0 10px rgba(211,47,47,0.3); }
        
        #pin-input { letter-spacing: 12px; font-size: 2.5rem; }
        
        button { 
            width: 100%; padding: 1.2rem; background: #D32F2F; color: #fff; 
            border: none; border-radius: 15px; font-weight: 900; font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 5px 15px rgba(211,47,47,0.4);
        }
        button:active { transform: scale(0.98); }
        
        #app { display: none; height: 100vh; flex-direction: column; padding: 1rem; overflow: hidden; }
        .topbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #D32F2F; padding-bottom: 0.8rem; margin-bottom: 1rem; background: rgba(0,0,0,0.5); border-radius: 0 0 15px 15px; padding: 10px; }
        
        .main-container { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        
        .nav { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .nav button { flex: 1; padding: 0.8rem; font-size: 0.9rem; background: #111; border: 1px solid #333; }
        .nav button.active { background: #D32F2F; }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .form-card { background: rgba(0,0,0,0.7); padding: 1.5rem; border-radius: 20px; border: 1px solid rgba(211,47,47,0.2); }
        label { color: #D32F2F; font-weight: 900; font-size: 0.8rem; letter-spacing: 1px; display: block; margin-bottom: 0.5rem; text-transform: uppercase; }
        
        .entry-card { background: rgba(10,10,10,0.8); padding: 1.2rem; border-radius: 15px; border: 1px solid #222; border-left: 4px solid #D32F2F; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .entry-info b { color: #fff; display: block; font-size: 1.1rem; text-transform: uppercase; }
        .entry-info small { color: #777; font-size: 0.8rem; }
        .zone-pill { background: #D32F2F; color: #fff; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 0.7rem; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #D32F2F; color: #fff; padding: 1rem 2rem; border-radius: 50px; display: none; z-index: 2000; font-weight: 900; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="assets/images/logo_2.jpg" alt="ASSIMA 10" class="logo">
            <h2 style="margin-bottom:1.5rem; font-style:italic; font-weight:900;">EL ASSIMA EGYPT</h2>
            <input type="tel" id="pin-input" maxlength="4" placeholder="••••">
            <button onclick="checkPin()">ENTRER</button>
            <p id="err" style="color:#FFF; margin-top:1rem; font-weight:900;"></p>
        </div>
    </div>

    <div id="app">
        <div class="topbar">
            <img src="assets/images/logo_2.jpg" alt="Logo" style="width:45px;">
            <h3 style="font-style:italic; font-weight:900; color:#fff;">PLANNING EGYPT</h3>
            <button onclick="location.reload()" style="background:none; color:#fff; font-size:1.5rem; width:auto; box-shadow:none;">🚪</button>
        </div>

        <div class="nav">
            <button id="nav-form" class="active" onclick="showPage('form')">SAISIE</button>
            <button id="nav-list" onclick="showPage('list')" style="display:none;">RESERVATIONS</button>
        </div>

        <div class="main-container">
            <div id="form" class="page active">
                <div class="form-card">
                    <label>NOM ET PRÉNOM DU CLIENT</label>
                    <input type="text" id="fullname" placeholder="Saisir le nom..." style="font-size:1.1rem; text-align:left; letter-spacing:0; padding:1rem;">
                    
                    <div style="display:flex; gap:10px;">
                        <div style="flex:1;"><label>DATE D'ARRIVÉE</label><input type="date" id="arrival" style="font-size:1rem;"></div>
                        <div style="flex:1;"><label>DATE DE SORTIE</label><input type="date" id="departure" style="font-size:1rem;"></div>
                    </div>
                    
                    <label>ZONE DE RÉSIDENCE</label>
                    <select id="zone" style="font-size:1.1rem; text-align:left;">
                        <option value="Zone 1">Zone 1</option>
                        <option value="Zone 2">Zone 2</option>
                        <option value="Zone 3">Zone 3</option>
                        <option value="Zone 4">Zone 4</option>
                        <option value="Zone 5">Zone 5</option>
                        <option value="Zone 6">Zone 6</option>
                        <option value="Zone 7">Zone 7</option>
                        <option value="Zone 8">Zone 8</option>
                        <option value="Zone 9">Zone 9</option>
                        <option value="Zone 10">Zone 10</option>
                        <option value="Zone 11">Zone 11</option>
                        <option value="Zone 12">Zone 12</option>
                        <option value="Zone 13">Zone 13</option>
                        <option value="Zone 14">Zone 14</option>
                    </select>
                    
                    <button onclick="saveData()">CONFIRMER L'ENREGISTREMENT</button>
                </div>
            </div>

            <div id="list" class="page">
                 <div id="data-list"></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const config = {
            apiKey: "AIzaSyBgK8ZKmZ0N329vOTfpiAyYAhPu_mhyTAM",
            authDomain: "app-10-1b5fd.firebaseapp.com",
            projectId: "app-10-1b5fd",
            storageBucket: "app-10-1b5fd.appspot.com",
            messagingSenderId: "179443689337",
            appId: "1:179443689337:web:31ca73ac50811b286931a8"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        let appMode = "";

        function checkPin() {
            const val = document.getElementById('pin-input').value;
            if (val === "0101" || val === "2020") {
                appMode = val;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                if (val === "2020") document.getElementById('nav-list').style.display = 'block';
                loadData();
            } else {
                document.getElementById('err').innerText = "VÉRIFIEZ VOTRE CODE";
                document.getElementById('pin-input').value = "";
            }
        }

        document.getElementById('pin-input').addEventListener('input', function(e) {
            if (this.value.length === 4) checkPin();
        });

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }

        async function saveData() {
            const btn = event.target;
            const name = document.getElementById('fullname').value;
            const arr = document.getElementById('arrival').value;
            const dep = document.getElementById('departure').value;
            const z = document.getElementById('zone').value;

            if (!name || !arr || !dep) return toast("Remplir tous les champs");
            
            btn.disabled = true;
            btn.innerText = "PATIENTEZ...";
            
            try {
                await db.collection("registrations").add({
                    fullname: name,
                    arrival: arr,
                    departure: dep,
                    zone: z,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                toast("ENREGISTRÉ AVEC SUCCÈS !");
                document.getElementById('fullname').value = "";
                if (appMode === "2020") setTimeout(() => showPage('list'), 1000);
            } catch(e) { toast("ERREUR CONNEXION"); }
            btn.disabled = false;
            btn.innerText = "CONFIRMER L'ENREGISTREMENT";
        }

        function loadData() {
            db.collection("registrations").orderBy("timestamp", "desc").limit(50).onSnapshot(snap => {
                const list = document.getElementById('data-list');
                list.innerHTML = "";
                if (snap.empty) {
                    list.innerHTML = "<p style='text-align:center; color:#555;'>Aucune donnée</p>";
                    return;
                }
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="entry-card">
                            <div class="entry-info">
                                <b>${d.fullname}</b>
                                <small>Arrivée: ${formatDate(d.arrival)} - Sortie: ${formatDate(d.departure)}</small>
                            </div>
                            <div class="zone-pill">${d.zone}</div>
                        </div>`;
                });
            });
        }

        function formatDate(s) {
            if (!s) return "-";
            const p = s.split('-');
            return p[2] + "/" + p[1] + "/" + p[0];
        }

        function toast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
