<!DOCTYPE html>
<html lang="fr" style="background:#000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL ASSIMA EGYPT</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; color: #D32F2F; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('assets/images/arriere_plan.jpg') center/cover no-repeat fixed;
        }
        
        #login-screen { 
            position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.73), rgba(0,0,0,0.85)), url('assets/images/arriere_plan.jpg') center/cover no-repeat;
        }
        .login-box { text-align: center; width: 90%; max-width: 400px; padding: 2.5rem; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); border-radius: 40px; border: 1px solid rgba(211,47,47,0.3); }
        .logo { width: 130px; margin-bottom: 2rem; }
        
        input, select { 
            width: 100%; padding: 1.1rem; font-size: 1.4rem; text-align: center; 
            background: #000; border: 2px solid #333; color: #fff; border-radius: 12px;
            margin-bottom: 1rem; outline: none;
        }
        input:focus { border-color: #D32F2F; }
        #pin-input { letter-spacing: 12px; font-size: 2.2rem; }
        
        button { 
            width: 100%; padding: 1.2rem; background: #D32F2F; color: #fff; border: none; border-radius: 15px; font-weight: 900; font-size: 1.1rem; cursor: pointer;
        }
        
        #app { display: none; height: 100vh; flex-direction: column; padding: 0.5rem; }
        .topbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #D32F2F; padding: 10px 15px; background: #000; border-radius: 15px; }

        /* DECORATIVE PHOTO STRIP */
        .photo-strip {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px;
            scrollbar-width: none;
        }
        .photo-strip::-webkit-scrollbar { display: none; }
        .photo-strip img { height: 70px; min-width: 100px; object-fit: cover; border-radius: 10px; border: 1px solid #333; }

        .main-container { flex: 1; overflow-y: auto; padding-bottom: 100px; padding: 0 5px; }
        
        .nav { display: flex; gap: 5px; margin-bottom: 1rem; }
        .nav button { flex: 1; padding: 0.8rem; font-size: 0.8rem; background: #111; border: 1px solid #333; font-weight: 900; color:#555; }
        .nav button.active { background: #D32F2F; color: #fff; }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .form-card { background: rgba(0,0,0,0.8); padding: 1.2rem; border-radius: 20px; border: 1px solid #222; }
        label { color: #D32F2F; font-weight: 900; font-size: 0.7rem; margin-bottom: 4px; display: block; }
        
        /* ZONE GROUPING */
        .zone-group { margin-bottom: 2rem; }
        .zone-header { background: #D32F2F; color: #fff; padding: 6px 15px; font-weight: 900; border-radius: 10px; display: inline-block; margin-bottom: 10px; font-size: 0.8rem; }
        
        .entry-card { background: #111; padding: 12px; border-radius: 12px; border: 1px solid #222; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .entry-info b { color: #fff; display: block; font-size: 1rem; text-transform: uppercase; }
        .entry-info small { color: #666; font-size: 0.75rem; }
        .dates-pill { background: #1a1a1a; color: #D32F2F; padding: 3px 8px; border-radius: 5px; font-size: 0.65rem; font-weight: 900; }
        
        #toast { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: #D32F2F; color: white; padding: 8px 20px; border-radius: 20px; display: none; font-weight: 900; z-index: 3000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="assets/images/logo_2.jpg" alt="Logo" class="logo">
            <img src="assets/images/EL ASSIMA.jpeg" alt="Nom" style="height:40px; margin-bottom:1.5rem;">
            <input type="tel" id="pin-input" maxlength="4" placeholder="••••">
            <button onclick="checkPin()">OUVRIR SESSION</button>
            <p id="err" style="color:#FFF; margin-top:1rem; font-size:0.8rem; font-weight:900;"></p>
        </div>
    </div>

    <div id="app">
        <div class="topbar">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="assets/images/logo_2.jpg" alt="Logo" style="width:35px;">
                <img src="assets/images/EL ASSIMA.jpeg" alt="Assima" style="height:30px;">
            </div>
            <button onclick="location.reload()" style="background:none; color:#fff; font-size:1.3rem; border:none;">🚪</button>
        </div>

        <div class="main-container">
            <!-- DECORATIVE GALLERY AT TOP -->
            <div class="photo-strip">
                <img src="assets/images/PINS.png" alt="1">
                <img src="assets/images/STICKERS.jpeg" alt="2">
                <img src="assets/images/porte-clé.jpeg" alt="3">
                <img src="assets/images/Béret 1.jpeg" alt="4">
                <img src="assets/images/Béret 2.jpeg" alt="5">
                <img src="assets/images/porte clé new.jpg" alt="6">
            </div>

            <div class="nav">
                <button id="nav-form" class="active" onclick="showPage('form')">SAISIE CLIENT</button>
                <button id="nav-list" onclick="showPage('list')" style="display:none;">PLANNING ZONES</button>
            </div>

            <div id="form" class="page active">
                <div class="form-card">
                    <label>NOM COMPLET DU CLIENT</label>
                    <input type="text" id="fullname" placeholder="..." style="text-align:left; letter-spacing:0; padding:12px;">
                    <div style="display:flex; gap:10px;">
                        <div style="flex:1;"><label>ARRIVÉE</label><input type="date" id="arrival"></div>
                        <div style="flex:1;"><label>SORTIE</label><input type="date" id="departure"></div>
                    </div>
                    <label>ZONE</label>
                    <select id="zone" style="text-align:left;">
                        <script>for(let i=1; i<=14; i++) document.write(`<option value="Zone ${i}">Zone ${i}</option>`);</script>
                    </select>
                    <button onclick="saveData()">VALIDER L'INSCRIPTION</button>
                </div>
            </div>

            <div id="list" class="page">
                 <div id="data-list"></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const config = {
            apiKey: "AIzaSyBgK8ZKmZ0N329vOTfpiAyYAhPu_mhyTAM",
            authDomain: "app-10-1b5fd.firebaseapp.com",
            projectId: "app-10-1b5fd",
            storageBucket: "app-10-1b5fd.appspot.com",
            messagingSenderId: "179443689337",
            appId: "1:179443689337:web:31ca73ac50811b286931a8"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        let appMode = "";

        function checkPin() {
            const val = document.getElementById('pin-input').value;
            if (val === "0101" || val === "2020") {
                appMode = val;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                if (val === "2020") document.getElementById('nav-list').style.display = 'block';
                loadData();
            } else {
                document.getElementById('err').innerText = "VÉRIFIEZ LE CODE";
                document.getElementById('pin-input').value = "";
            }
        }
        document.getElementById('pin-input').addEventListener('input', function(e) {
            if (this.value.length === 4) checkPin();
        });

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }

        async function saveData() {
            const btn = event.target;
            const name = document.getElementById('fullname').value;
            const arr = document.getElementById('arrival').value;
            const dep = document.getElementById('departure').value;
            const z = document.getElementById('zone').value;
            if (!name || !arr || !dep) return toast("CHAMPS VIDES");
            btn.disabled = true;
            try {
                await db.collection("registrations").add({
                    fullname: name, arrival: arr, departure: dep, zone: z,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                toast("ENREGISTRÉ !");
                document.getElementById('fullname').value = "";
                if (appMode === "2020") setTimeout(() => showPage('list'), 800);
            } catch(e) { toast("ERREUR"); }
            btn.disabled = false;
        }

        function loadData() {
            db.collection("registrations").orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('data-list');
                list.innerHTML = "";
                const grouped = {};
                snap.forEach(doc => {
                    const d = doc.data();
                    if (!grouped[d.zone]) grouped[d.zone] = [];
                    grouped[d.zone].push(d);
                });

                // Render by zone
                Object.keys(grouped).sort((a,b) => a.localeCompare(b, undefined, {numeric: true})).forEach(zone => {
                    let html = `<div class="zone-group"><div class="zone-header">${zone}</div>`;
                    grouped[zone].forEach(item => {
                        html += `
                        <div class="entry-card">
                            <div class="entry-info">
                                <b>${item.fullname}</b>
                                <small>Du ${formatDate(item.arrival)} au ${formatDate(item.departure)}</small>
                            </div>
                            <div class="dates-pill">${formatDate(item.arrival)}</div>
                        </div>`;
                    });
                    html += `</div>`;
                    list.innerHTML += html;
                });
            });
        }

        function formatDate(s) {
            if (!s) return "-";
            const p = s.split('-'); return p[2] + "/" + p[1];
        }

        function toast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
