<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="EL ASSIMA EGYPT - Gestion des Réservations">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ASSIMA EGY">
  <title>EL ASSIMA EGYPT | Réservations</title>
  
  <link rel="apple-touch-icon" href="assets/images/logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div class="splash-logo">
      <img src="assets/images/logo.webp" alt="EL ASSIMA LOGO" style="width: 100px; height: 100px; object-fit: contain;">
    </div>
    <h1 class="splash-title">EL ASSIMA</h1>
    <p class="splash-sub">Egypt Edition</p>
  </div>

  <!-- MAIN APP (Visible by default, no code) -->
  <div id="app" style="display: flex;">
    <header class="topbar">
      <div class="brand">
        <div class="top-logo">
          <img src="assets/images/logo.webp" alt="EL ASSIMA LOGO" style="width: 30px; height: 30px; object-fit: contain;">
        </div>
        <div class="top-name">ASSIMA EGYPT</div>
      </div>
      <div class="status-indicator" id="current-date">--/--/----</div>
    </header>

    <main class="page-container">
      
      <!-- PAGE: SAISIE -->
      <section id="page-form" class="page active">
        <div class="page-header">
          <h1>Saisie</h1>
          <p>Nouvel enregistrement</p>
        </div>
        <div class="form-container">
          <form id="guest-form" onsubmit="submitForm(event)">
            <div class="input-group"><label>NOM ET PRÉNOM</label><input type="text" id="fullname" placeholder="Nom complet" required></div>
            <div class="input-row">
              <div class="input-group" style="margin:0"><label>ARRIVÉE</label><input type="date" id="arrival-date" required></div>
              <div class="input-group" style="margin:0"><label>SORTIE</label><input type="date" id="departure-date" required></div>
            </div>
            <div class="input-group">
              <label>ZONE / EMPLACEMENT</label>
              <select id="zone" required>
                <option value="" disabled selected>Choisir...</option>
                <option value="Premium">Zone Premium</option>
                <option value="Standard">Zone Standard</option>
                <option value="VIP">Espace VIP</option>
                <option value="Terrasse">Terrasse</option>
              </select>
            </div>
            <button type="submit" class="btn-gold-wide">VALIDER</button>
          </form>
        </div>
      </section>

      <!-- PAGE: PLANNING -->
      <section id="page-list" class="page">
        <div class="page-header">
          <h1>Planning</h1>
          <p>Fiches de réservations</p>
        </div>
        <div class="view-tabs">
          <button class="active" onclick="switchTab('arrivals')">Arrivées</button>
          <button onclick="switchTab('departures')">Sorties</button>
        </div>
        <div id="tab-arrivals" class="tab-content active"><div id="arrivals-container"></div></div>
        <div id="tab-departures" class="tab-content"><div id="departures-container"></div></div>
      </section>

    </main>

    <!-- BOTTOM NAV (Always visible) -->
    <nav class="bottom-nav">
      <div class="nav-item active" id="nav-form" onclick="switchPage('form')">
        <div class="nav-icon">📝</div><span>Saisie</span>
      </div>
      <div class="nav-item" id="nav-list" onclick="switchPage('list')">
        <div class="nav-icon">📅</div><span>Planning</span>
      </div>
    </nav>
  </div>

  <div id="toast">Opération réussie</div>

  <script src="script.js"></script>
</body>
</html>
