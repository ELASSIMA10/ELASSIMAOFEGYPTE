<!DOCTYPE html>
<html lang="fr" style="background:#000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL ASSIMA EGYPT</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #D32F2F; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        #login-screen { 
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { text-align: center; width: 90%; max-width: 400px; }
        .logo { width: 180px; margin-bottom: 2rem; }
        
        input { 
            width: 100%; padding: 1.5rem; font-size: 2rem; text-align: center; 
            background: #111; border: 2px solid #333; color: #fff; border-radius: 15px;
            margin-bottom: 1.5rem; outline: none; letter-spacing: 10px;
        }
        input:focus { border-color: #D32F2F; }
        
        button { 
            width: 100%; padding: 1.2rem; background: #D32F2F; color: #fff; 
            border: none; border-radius: 15px; font-weight: 900; font-size: 1.2rem; cursor: pointer;
        }
        
        #app { display: none; height: 100vh; flex-direction: column; padding: 1rem; overflow-y: auto; }
        .topbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 1rem; margin-bottom: 1rem; }
        .nav { display: flex; gap: 1rem; margin-top: 1rem; }
        .page { display: none; }
        .page.active { display: block; }
        
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #D32F2F; color: #fff; padding: 1rem; border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="assets/images/logo_2.jpg" alt="EL ASSIMA 10" class="logo">
            <h2 style="margin-bottom:1.5rem; letter-spacing:3px;">ACCÈS RÉSERVÉ</h2>
            <input type="tel" id="pin-input" maxlength="4" placeholder="••••">
            <button onclick="checkPin()">VALIDER</button>
            <p id="err" style="color:#ff0; margin-top:1rem;"></p>
        </div>
    </div>

    <div id="app">
        <div class="topbar">
            <img src="assets/images/logo_2.jpg" alt="Logo" style="width:40px;">
            <h3 style="font-style:italic;">ASSIMA EGYPT</h3>
            <button onclick="location.reload()" style="background:none; color:#fff; font-size:1.5rem; width:auto;">🚪</button>
        </div>

        <div class="nav">
            <button onclick="showPage('form')" style="flex:1;">SAISIE</button>
            <button id="btn-list" onclick="showPage('list')" style="flex:1; display:none;">PLANNING</button>
        </div>

        <div id="form" class="page active" style="margin-top:2rem;">
            <label>NOM ET PRÉNOM</label><br>
            <input type="text" id="fullname" placeholder="Nom complet" style="font-size:1.2rem; letter-spacing:0; padding:1rem; margin-top:0.5rem;"><br>
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>ARRIVÉE</label><input type="date" id="arrival" style="font-size:1rem; letter-spacing:0;"></div>
                <div style="flex:1;"><label>SORTIE</label><input type="date" id="departure" style="font-size:1rem; letter-spacing:0;"></div>
            </div>
            <label>ZONE</label><br>
            <select id="zone" style="width:100%; padding:1rem; background:#111; color:#fff; border:1px solid #333; border-radius:10px; margin-bottom:1.5rem;">
                <option value="Premium">Zone Premium</option>
                <option value="Standard">Zone Standard</option>
                <option value="VIP">Espace VIP</option>
                <option value="Terrasse">Terrasse</option>
            </select>
            <button onclick="saveData()">ENREGISTRER</button>
        </div>

        <div id="list" class="page" style="margin-top:2rem;">
             <h4 style="color:#fff; margin-bottom:1rem;">RÉSERVATIONS</h4>
             <div id="data-list"></div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const config = {
            apiKey: "AIzaSyBgK8ZKmZ0N329vOTfpiAyYAhPu_mhyTAM",
            authDomain: "app-10-1b5fd.firebaseapp.com",
            projectId: "app-10-1b5fd",
            storageBucket: "app-10-1b5fd.appspot.com",
            messagingSenderId: "179443689337",
            appId: "1:179443689337:web:31ca73ac50811b286931a8"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        let mode = "";

        function checkPin() {
            const val = document.getElementById('pin-input').value;
            if (val === "0101" || val === "2020") {
                mode = val;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                if (val === "2020") document.getElementById('btn-list').style.display = 'block';
                loadData();
            } else {
                document.getElementById('err').innerText = "CODE FAUX";
                document.getElementById('pin-input').value = "";
            }
        }

        // Auto-check on 4 digits
        document.getElementById('pin-input').addEventListener('input', function(e) {
            if (this.value.length === 4) checkPin();
        });

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function saveData() {
            const btn = event.target;
            const data = {
                fullname: document.getElementById('fullname').value,
                arrival: document.getElementById('arrival').value,
                departure: document.getElementById('departure').value,
                zone: document.getElementById('zone').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (!data.fullname) return alert("Nom recquis");
            
            btn.disabled = true;
            try {
                await db.collection("registrations").add(data);
                toast("Enregistré !");
                document.getElementById('fullname').value = "";
            } catch(e) { alert("Erreur reseau"); }
            btn.disabled = false;
        }

        function loadData() {
            db.collection("registrations").orderBy("timestamp", "desc").limit(20).onSnapshot(snap => {
                const list = document.getElementById('data-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div style="background:#111; padding:10px; border-left:3px solid #D32F2F; margin-bottom:10px;">
                        <b style="color:#fff;">${d.fullname}</b><br>
                        <small>Du ${d.arrival} au ${d.departure}</small> (${d.zone})
                    </div>`;
                });
            });
        }

        function toast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
