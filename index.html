<!DOCTYPE html>
<html lang="fr" style="background:#000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/images/logo_2.jpg">
    <link rel="icon" type="image/jpeg" href="assets/images/logo_2.jpg">
    <title>EL ASSIMA EGYPT</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; color: #D32F2F; font-family: 'Outfit', sans-serif; 
            height: 100vh; height: 100dvh; overflow: hidden; 
            background: url('assets/images/arriere_plan.jpg?v=1') center/cover no-repeat fixed;
        }
        
        #login-screen { 
            position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5) url('assets/images/arriere_plan.jpg?v=1') center/cover no-repeat;
            background-blend-mode: darken;
        }
        .login-box { 
            text-align: center; width: 95%; max-width: 400px; padding: 2rem; 
            background: rgba(0,0,0,0.9); border-radius: 40px; border: 3px solid #D32F2F; 
        }
        .logo-login { height: 110px; margin-bottom: 2rem; }
        
        input, select { 
            width: 100%; padding: 1.1rem; font-size: 1.4rem; text-align: center; 
            background: #000; border: 2px solid #331111; color: #fff; border-radius: 12px;
            margin-bottom: 1rem; outline: none;
        }
        input:focus { border-color: #D32F2F; }
        #pin-input { font-size: 2.2rem; font-weight: 900; letter-spacing: 12px; }
        
        #app { display: none; height: 100%; height: 100dvh; flex-direction: column; padding: 5px; padding-top: max(5px, env(safe-area-inset-top)); padding-bottom: max(5px, env(safe-area-inset-bottom)); }
        .topbar { 
            display: flex; align-items: center; gap: 8px; 
            background: #000; padding: 10px; border-radius: 15px; 
            border-bottom: 3px solid #D32F2F; margin-bottom: 10px;
            overflow-x: auto; flex-shrink: 0;
        }
        .topbar::-webkit-scrollbar { display: none; }
        .topbar img { height: 45px; min-width: 45px; object-fit: contain; flex-shrink: 0; }

        .main-container { flex: 1; overflow-y: auto; padding-bottom: 100px; padding: 0 5px; }
        .nav { display: flex; gap: 5px; margin-bottom: 1rem; }
        .nav button { flex: 1; padding: 0.9rem; background: #111; border: 1px solid #D32F2F; color:#fff; font-weight: 900; border-radius: 10px; }
        .nav button.active { background: #D32F2F; }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .stats-banner { background: #D32F2F; color: #fff; padding: 1rem; border-radius: 15px; margin-bottom: 1.5rem; display: none; justify-content: space-between; align-items: center; font-weight: 900; }
        
        .form-card { background: rgba(0,0,0,0.85); padding: 1.5rem; border-radius: 20px; border: 2px solid #D32F2F; }
        label { color: #D32F2F; font-weight: 900; font-size: 0.8rem; margin-bottom: 5px; display: block; }
        
        .entry-card { background: #000; padding: 15px; border-radius: 15px; border: 1px solid #222; border-left: 5px solid #D32F2F; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .entry-info b { color: #fff; display: block; }
        .dates-pill { background: #D32F2F; color: #fff; padding: 4px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; }
        .zone-header { background: #D32F2F; color: #FFF; padding: 10px; font-weight: 900; border-radius: 10px; margin: 15px 0 10px; text-align: center; text-transform: uppercase; }
        
        #toast { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: #D32F2F; color: white; padding: 10px 20px; border-radius: 20px; display: none; font-weight: 900; z-index: 3000; }
    </style>
</head>
<body>

    <audio id="bg-music" src="assets/music.mp3" loop preload="auto"></audio>

    <div id="login-screen">
        <div class="login-box">
            <img src="assets/images/logo_2.jpg?v=2" alt="Logo" class="logo-login">
            <img src="assets/images/EL_ASSIMA.jpg?v=2" alt="Nom" style="height:50px; display:block; margin: 0 auto 1.5rem; object-fit:contain;">
            <input type="tel" id="pin-input" maxlength="4" placeholder="••••">
            <button onclick="checkPin()" style="background:#D32F2F; color:#fff; font-weight:900; padding:15px; border:none; border-radius:15px; width:100%; cursor:pointer;">VALIDER</button>
            <p id="err" style="color:#FFF; margin-top:10px; font-weight:900;"></p>
        </div>
    </div>

    <div id="app">
        <div class="topbar">
            <!-- FORCE REFRESH WITH TIMESTAMP ?v=2 -->
            <img src="assets/images/logo_2.jpg?v=2" alt="L">
            <img src="assets/images/EL_ASSIMA.jpg?v=2" alt="N">
            <img src="assets/images/IMG1.jpg?v=2" alt="P1">
            <img src="assets/images/IMG2.jpg?v=2" alt="P2">
            <img src="assets/images/IMG3.jpg?v=2" alt="P3">
            <div style="flex:1;"></div>
            <button id="music-btn" onclick="toggleMusic()" style="background:none; border:none; cursor:pointer; font-size:1.5rem;" title="Musique">🔇</button>
            <button onclick="location.reload()" style="background:none; color:#D32F2F; font-size:1.5rem; border:none; cursor:pointer;">🚪</button>
        </div>

        <div class="main-container">
            <div class="nav">
                <button id="nav-form" class="active" onclick="showPage('form')">SAISIE</button>
                <button id="nav-list" onclick="showPage('list')" style="display:none;">PLANNING</button>
                <button id="nav-dates" onclick="showPage('dates')" style="display:none;">DATES</button>
                <button id="nav-nohotel" onclick="showPage('nohotel')" style="display:none;">SANS HÔTEL</button>
            </div>

            <div id="form" class="page active">
                <div class="form-card">
                    <label>MEMBRE</label>
                    <input type="text" id="fullname" placeholder="..." style="text-align:left; letter-spacing:0; padding:12px;">
                    <div style="display:flex; gap:10px;">
                        <div style="flex:1;"><label>ARRIVÉE</label><input type="date" id="arrival"></div>
                        <div style="flex:1;"><label>SORTIE</label><input type="date" id="departure"></div>
                    </div>
                    <label>ZONE</label>
                    <select id="zone" style="text-align:left; margin-bottom:10px;">
                        <script>for(let i=1; i<=14; i++) document.write(`<option value="Zone ${i}">Zone ${i}</option>`);</script>
                    </select>
                    <label>HÔTEL AVEC GROUPE</label>
                    <select id="hotel" style="text-align:left;">
                        <option value="Oui">Oui</option>
                        <option value="Non">Non</option>
                    </select>
                    <button onclick="saveData()" style="width:100%; padding:15px; background:#D32F2F; color:#fff; border:none; border-radius:15px; font-weight:900;">ENREGISTRER</button>
                </div>
            </div>

            <div id="list" class="page">
                 <div id="stats-area" class="stats-banner">
                    <div>TOTAL RÉSERVATIONS</div>
                    <span id="total-count">0</span>
                </div>
                <div id="data-list"></div>
            </div>

            <div id="dates" class="page">
                <h3 style="color:#FFF; text-align:center; padding:10px 0; margin-bottom: 10px;">RÉSERVATIONS PAR DATE</h3>
                <div id="dates-list"></div>
            </div>

            <div id="nohotel" class="page">
                <h3 style="color:#FFF; text-align:center; padding:10px 0; margin-bottom: 10px;">SANS HÔTEL</h3>
                <div id="nohotel-list"></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const config = {
            apiKey: "AIzaSyBgK8ZKmZ0N329vOTfpiAyYAhPu_mhyTAM",
            authDomain: "app-10-1b5fd.firebaseapp.com",
            projectId: "app-10-1b5fd",
            storageBucket: "app-10-1b5fd.appspot.com",
            messagingSenderId: "179443689337",
            appId: "1:179443689337:web:31ca73ac50811b286931a8"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        let appMode = "";
        
        const bgMusic = document.getElementById('bg-music');
        let musicPlaying = false;

        function toggleMusic() {
            if(musicPlaying) {
                bgMusic.pause();
                document.getElementById('music-btn').innerText = "🔇";
            } else {
                bgMusic.play().catch(e => console.log(e));
                document.getElementById('music-btn').innerText = "🎵";
            }
            musicPlaying = !musicPlaying;
        }

        function checkPin() {
            const val = document.getElementById('pin-input').value.trim();
            if (val === "0101" || val === "2020") {
                appMode = val;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                if (val === "2020") {
                    document.getElementById('nav-list').style.display = 'block';
                    document.getElementById('nav-dates').style.display = 'block';
                    document.getElementById('nav-nohotel').style.display = 'block';
                    document.getElementById('stats-area').style.display = 'flex';
                }
                loadData();
                setCurrentTime();
                
                // Lancer la musique après interaction (clic de validation)
                bgMusic.play().then(() => {
                    musicPlaying = true;
                    document.getElementById('music-btn').innerText = "🎵";
                }).catch(e => console.log("La musique n'a pas pu démarrer", e));
                
            } else {
                document.getElementById('err').innerText = "CODE FAUX";
                document.getElementById('pin-input').value = "";
            }
        }
        document.getElementById('pin-input').addEventListener('input', function(e) {
            if (this.value.length === 4) checkPin();
        });

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }

        async function saveData() {
            const btn = event.target;
            const name = document.getElementById('fullname').value;
            const arr = document.getElementById('arrival').value;
            const dep = document.getElementById('departure').value;
            const z = document.getElementById('zone').value;
            const hotelVal = document.getElementById('hotel').value;
            if (!name || !arr || !dep) return toast("CHAMPS VIDES");
            btn.disabled = true;
            try {
                await db.collection("registrations").add({
                    fullname: name, arrival: arr, departure: dep, 
                    zone: z, hotel: hotelVal,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                toast("ENREGISTRÉ !");
                document.getElementById('fullname').value = "";
                setCurrentTime();
            } catch(e) { toast("ERREUR"); }
            btn.disabled = false;
        }

        function loadData() {
            db.collection("registrations").orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('data-list');
                const totalCountEl = document.getElementById('total-count');
                if (totalCountEl) totalCountEl.innerText = snap.size;

                list.innerHTML = "";
                const grouped = {};
                const groupedNoHotel = {};
                
                snap.forEach(doc => {
                    const d = doc.data();
                    d.id = doc.id; // Store ID for deletion
                    
                    if(d.hotel === "Non") {
                        if (!groupedNoHotel[d.zone]) groupedNoHotel[d.zone] = [];
                        groupedNoHotel[d.zone].push(d);
                    } else {
                        if (!grouped[d.zone]) grouped[d.zone] = [];
                        grouped[d.zone].push(d);
                    }
                });

                Object.keys(grouped).sort((a,b) => a.localeCompare(b, undefined, {numeric: true})).forEach(zone => {
                    let html = `<div class="zone-group"><div class="zone-header">${zone} (${grouped[zone].length})</div>`;
                    grouped[zone].forEach(item => {
                        html += `
                        <div class="entry-card">
                            <div class="entry-info">
                                <b>${item.fullname}</b>
                                <small>Séjour: ${formatDate(item.arrival)} au ${formatDate(item.departure)}</small>
                            </div>
                            <div style="display:flex; align-items:center; gap: 10px;">
                                <div class="dates-pill">${formatDate(item.arrival)}</div>
                                <button onclick="deleteEntry('${item.id}')" style="background:none; border:none; cursor:pointer; font-size:1.5rem;" title="Supprimer / Réinitialiser">❌</button>
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                    list.innerHTML += html;
                });
                
                // Render No Hotel
                const noHotelList = document.getElementById('nohotel-list');
                noHotelList.innerHTML = "";
                Object.keys(groupedNoHotel).sort((a,b) => a.localeCompare(b, undefined, {numeric: true})).forEach(zone => {
                    let html = `<div class="zone-group"><div class="zone-header">${zone} (${groupedNoHotel[zone].length})</div>`;
                    groupedNoHotel[zone].forEach(item => {
                        html += `
                        <div class="entry-card">
                            <div class="entry-info">
                                <b>${item.fullname}</b>
                                <small>Séjour: ${formatDate(item.arrival)} au ${formatDate(item.departure)}</small>
                            </div>
                            <div style="display:flex; align-items:center; gap: 10px;">
                                <div class="dates-pill">${formatDate(item.arrival)}</div>
                                <button onclick="deleteEntry('${item.id}')" style="background:none; border:none; cursor:pointer; font-size:1.5rem;" title="Supprimer">❌</button>
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                    noHotelList.innerHTML += html;
                });

                // Groupement par Période (Arrivée -> Départ) puis par Zone
                const groupedByDate = {};
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.hotel === "Non") return; // On ignore les SANS HOTEL dans le panneau DATES
                    
                    const period = `${d.arrival}_${d.departure}`;
                    if(!groupedByDate[period]) groupedByDate[period] = {};
                    if(!groupedByDate[period][d.zone]) groupedByDate[period][d.zone] = [];
                    groupedByDate[period][d.zone].push(d);
                });
                
                const datesList = document.getElementById('dates-list');
                datesList.innerHTML = "";
                Object.keys(groupedByDate).sort().forEach(period => {
                    const [arr, dep] = period.split('_');
                    let dHtml = `<div style="background:#D32F2F; color:white; padding:10px; font-weight:900; border-radius:10px; margin-top:20px; text-align:center; font-size:1rem; letter-spacing:1px;">DU ${formatDate(arr)} AU ${formatDate(dep)}</div>`;
                    const zones = groupedByDate[period];
                    Object.keys(zones).sort((a,b) => a.localeCompare(b, undefined, {numeric: true})).forEach(z => {
                        dHtml += `<div style="background:#D32F2F; color:#FFF; padding:8px 15px; border-radius:8px; margin:10px 0 5px 0; font-weight:900; font-size:1rem; display:inline-block;">${z} (${zones[z].length})</div>`;
                        zones[z].forEach(item => {
                            dHtml += `
                            <div class="entry-card" style="margin-left:10px; padding:10px;">
                                <div class="entry-info">
                                    <b style="color:#fff;">${item.fullname}</b>
                                </div>
                                <button onclick="deleteEntry('${item.id}')" style="background:none; border:none; cursor:pointer; font-size:1.5rem;" title="Supprimer / Réinitialiser">❌</button>
                            </div>`;
                        });
                    });
                    datesList.innerHTML += dHtml;
                });
            });
        }

        function formatDate(s) {
            if (!s) return "-";
            const p = s.split('-'); return p[2] + "/" + p[1];
        }

        function setCurrentTime() {
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            
            document.getElementById('arrival').value = today;
            document.getElementById('departure').value = today;
        }

        async function deleteEntry(id) {
            if(confirm("Êtes-vous sûr de vouloir supprimer / réinitialiser ce membre ?")) {
                try {
                    await db.collection("registrations").doc(id).delete();
                    toast("MEMBRE SUPPRIMÉ !");
                } catch(e) {
                    toast("ERREUR");
                }
            }
        }

        function toast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
