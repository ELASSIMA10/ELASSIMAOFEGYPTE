<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASSIMA HUB | Egypt</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #D4AF37; --blue: #0A1931; --black: #020408; }
    body { background: var(--black); color: white; font-family: 'Outfit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .hub { text-align: center; max-width: 400px; padding: 2rem; border: 1px solid rgba(212,175,55,0.2); border-radius: 30px; background: linear-gradient(135deg, #050c18, #000); }
    h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.5rem; margin-bottom: 0.5rem; }
    p { color: rgba(255,255,255,0.6); margin-bottom: 2.5rem; }
    .btn { display: block; background: var(--gold); color: var(--blue); text-decoration: none; padding: 1.2rem; border-radius: 15px; font-weight: 900; margin-bottom: 1rem; transition: 0.3s; }
    .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(212,175,55,0.4); }
    .btn.outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
  </style>
</head>
<body>
  <div class="hub">
    <h1>EGYPT HUB</h1>
    <p>Portail Officiel d'El Assima en Égypte</p>
    <a href="index.html" class="btn">ACCÉDER À L'APP</a>
    <a href="#" class="btn outline">SITE WEB OFFICIEL</a>
    <div style="margin-top: 2rem; font-size: 0.7rem; color: rgba(255,255,255,0.3);">© 2026 EL ASSIMA EGY</div>
  </div>
</body>
</html>
